spring:
  application:
    name: medisync
  session:
    jdbc:
      initialize-schema: never

  datasource:
    url: jdbc:postgresql://localhost:5432/medisync_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  security:
    secret: ${JWT_SECRET:medisync-clave-secreta-super-larga-de-al-menos-256-bits-para-hmac-sha}
    expiration: ${JWT_EXPIRATION:86400000}